<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Наше Село — Товари і Послуги</title><style>:root{--green:#3B6D11;--green-light:rgb(207,216,200);--amber:#BA7517;--text:#1a1a18;--text-muted:#5F5E5A;--text-hint:#888780;--border:rgba(0,0,0,0.12);--bg:#f7f5f0;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,'Times New Roman',serif;background:var(--bg);color:var(--text);min-height:100vh}
.site-hero{color:#fff;text-align:center;position:relative}
.hero-bg-img{display:block;width:100%;height:auto;vertical-align:top}
.hero-overlay{position:absolute;top:0;left:0;right:0;z-index:1;padding:1.5rem 1rem 0;display:flex;flex-direction:column;align-items:center}
.hero-tint{position:absolute;inset:0;background:rgba(0,0,0,0.42);z-index:0}
.hero-no-photo{background:var(--green);padding:2rem 1rem 0;display:flex;flex-direction:column;align-items:center}
.site-title{font-size:clamp(1.4rem,4vw,2rem);font-weight:normal;letter-spacing:.02em;margin-bottom:.2rem}
.site-sub{font-size:14px;opacity:.85;font-family:Arial,sans-serif;margin-bottom:1rem}
.header-leaf{font-size:1.8rem;display:block;margin-bottom:.3rem}
.nav-bar{background:rgba(0,0,0,0.25);display:flex;justify-content:center;gap:4px;padding:8px 16px;flex-wrap:wrap;position:relative;z-index:2}
.nav-link{padding:6px 16px;border-radius:20px;font-size:13px;font-family:Arial,sans-serif;color:rgba(255,255,255,0.85);text-decoration:none;transition:all .15s}
.nav-link:hover{background:rgba(255,255,255,0.15);color:#fff}
.nav-link.active{background:rgba(255,255,255,0.92);color:var(--green);font-weight:bold}
.controls{background:transparent;padding:0 1rem 1.25rem;position:relative;z-index:2}
.search-wrap{max-width:560px;margin:0 auto .75rem;position:relative}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;border:none;border-radius:24px;font-size:15px;font-family:Arial,sans-serif;color:var(--text);background:rgba(255,255,255,0.95);outline:none;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;color:#999}
.cats-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;max-width:700px;margin:0 auto;scrollbar-width:none}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;padding:6px 14px;border:1.5px solid rgba(255,255,255,0.5);border-radius:20px;font-size:13px;font-family:Arial,sans-serif;cursor:pointer;background:rgba(255,255,255,0.15);color:#fff;transition:all .15s;flex-shrink:0}
.cat-btn.active{background:rgba(255,255,255,0.92);color:var(--green);border-color:transparent;font-weight:bold}
.main{max-width:900px;margin:0 auto;padding:1.25rem 1rem 3rem}
.count-line{font-size:13px;color:var(--text-hint);font-family:Arial,sans-serif;margin-bottom:1rem}
.news-board{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.5rem;overflow:hidden}
.news-board-header{background:var(--green);color:#fff;padding:.7rem 1rem;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;display:flex;align-items:center;gap:6px}
.news-list{padding:.5rem}
.news-item{padding:.6rem .75rem;border-radius:8px;margin-bottom:.4rem;display:flex;align-items:flex-start;gap:10px;border-left:3px solid #ddd}
.news-item.normal{border-left-color:#2980b9;background:#f4f9ff}
.news-item.important{border-left-color:#e07b00;background:#fff8f0}
.news-item.urgent{border-left-color:#c0392b;background:#fff5f5}
.news-emoji{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.news-body{flex:1}
.news-title{font-size:14px;font-weight:bold;font-family:Arial,sans-serif;color:var(--text);margin-bottom:2px}
.news-text{font-size:13px;font-family:Arial,sans-serif;color:var(--text-muted);line-height:1.4}
.news-date{font-size:11px;color:var(--text-hint);font-family:Arial,sans-serif;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.1);transform:translateY(-2px)}
.card-img{width:100%;height:130px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:.8rem}
.card-tag{font-size:11px;font-family:Arial,sans-serif;font-weight:bold;text-transform:uppercase;letter-spacing:.04em;color:var(--green);background:var(--green-light);padding:2px 7px;border-radius:4px;margin-bottom:5px;display:inline-block}
.card-name{font-size:15px;font-weight:bold;margin-bottom:4px;line-height:1.3}
.card-desc{font-size:13px;color:var(--text-muted);font-family:Arial,sans-serif;line-height:1.4;margin-bottom:7px}
.card-price{font-size:13px;font-family:Arial,sans-serif;color:var(--amber);font-weight:bold;margin-bottom:6px}
.card-phone{font-size:13px;font-family:Arial,sans-serif;color:var(--text-muted)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);max-width:400px;width:100%;overflow:hidden;animation:fU .2s ease}
@keyframes fU{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-img{width:100%;height:170px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:4.5rem;position:relative;overflow:hidden}
.modal-img img{width:100%;height:100%;object-fit:cover}
.modal-close{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;line-height:30px;text-align:center}
.modal-body{padding:1.1rem}
.modal-tag{font-size:11px;font-family:Arial,sans-serif;font-weight:bold;text-transform:uppercase;color:var(--green);background:var(--green-light);padding:2px 7px;border-radius:4px;margin-bottom:7px;display:inline-block}
.modal-name{font-size:18px;font-weight:bold;margin-bottom:5px}
.modal-desc{font-size:13px;color:var(--text-muted);font-family:Arial,sans-serif;line-height:1.55;margin-bottom:9px}
.modal-price{font-size:14px;font-family:Arial,sans-serif;color:var(--amber);font-weight:bold;margin-bottom:12px}
.modal-phone-btn{display:block;width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:15px;font-family:Arial,sans-serif;cursor:pointer;text-decoration:none;text-align:center}
.empty{text-align:center;padding:3rem 1rem;color:var(--text-hint);font-family:Arial,sans-serif}
.empty span{font-size:2.5rem;display:block;margin-bottom:.75rem}
footer{text-align:center;padding:1.5rem;font-size:12px;color:var(--text-hint);font-family:Arial,sans-serif;border-top:1px solid var(--border)}
.page-header{max-width:900px;margin:1.5rem auto .5rem;padding:0 1rem;font-size:22px;font-weight:bold;color:var(--text)}
.page-sub{max-width:900px;margin:0 auto 1rem;padding:0 1rem;font-size:14px;color:var(--text-muted);font-family:Arial,sans-serif}
.life-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
.life-emoji{font-size:2rem;flex-shrink:0;margin-top:2px}
.life-body{flex:1}
.life-title{font-size:16px;font-weight:bold;margin-bottom:4px}
.life-text{font-size:14px;font-family:Arial,sans-serif;color:var(--text-muted);line-height:1.55}
.life-date{font-size:12px;color:var(--text-hint);font-family:Arial,sans-serif;margin-top:5px}
.info-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
.info-emoji{font-size:1.8rem;flex-shrink:0;margin-top:2px}
.info-body{flex:1}
.info-title{font-size:15px;font-weight:bold;margin-bottom:5px;font-family:Arial,sans-serif}
.info-text{font-size:14px;font-family:Arial,sans-serif;color:var(--text-muted);line-height:1.6}
@media(max-width:480px){.grid{grid-template-columns:1fr 1fr;gap:10px}.card-img{height:100px;font-size:2rem}}</style></head><body>
<div class="site-hero">
  <div class="hero-no-photo" style="background:var(--green)">
    <span class="header-leaf">🌿</span>
    <div class="site-title">Наше Село</div>
    <div class="site-sub">Товари і послуги від місцевих жителів</div>
  </div>
  <div class="nav-bar" style="background:var(--green)"><a href="index.html" class="nav-link active">🏠 Головна</a><a href="life.html" class="nav-link">📰 Життя села</a><a href="info.html" class="nav-link">ℹ️ Для клієнтів</a></div>
  <div class="controls" style="background:var(--green)"><div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="search" placeholder="Пошук..." oninput="render()"></div><div class="cats-scroll" id="cats"></div></div>
</div>
<main class="main">
  <div id="news-board"></div>
  <div class="count-line" id="count"></div>
  <div class="grid" id="grid"></div>
</main>
<footer>Щоб додати своє оголошення — зателефонуйте адміністратору</footer>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-img" id="m-img"><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body"><div class="modal-tag" id="m-tag"></div><div class="modal-name" id="m-name"></div><div class="modal-desc" id="m-desc"></div><div class="modal-price" id="m-price"></div><a class="modal-phone-btn" id="m-phone">📞</a></div>
  </div>
</div>
<script>
const sellers=[{"id":1,"cat":"food","emoji":"🥚","name":"Марія Петренко","desc":"Яйця домашні від власних курей. Молоко козяче і коров'яче, сметана.","price":"Яйця — 10 грн/шт","phone":"063 111 22 33","photo":""},{"id":2,"cat":"food","emoji":"🍯","name":"Іван Коваль","desc":"Натуральний мед з власної пасіки. Липовий, гречаний, квітковий.","price":"від 200 грн/кг","phone":"050 222 33 44","photo":""},{"id":3,"cat":"wood","emoji":"🪵","name":"Василь Дровар","desc":"Дрова колоті сухі. Дуб, граб, ясен. Доставка по селу.","price":"від 1500 грн/скл.","phone":"096 444 55 66","photo":""},{"id":4,"cat":"service","emoji":"🔧","name":"Микола Майстер","desc":"Сантехніка, опалення, водопровід. Монтаж і ремонт котлів.","price":"від 300 грн/год","phone":"067 666 77 88","photo":""},{"id":5,"cat":"transport","emoji":"🚜","name":"Олег Тракторист","desc":"Оранка городу, культивація. Вивіз сміття та будматеріалів.","price":"від 500 грн/виїзд","phone":"099 111 22 33","photo":""},{"id":6,"cat":"animals","emoji":"🐓","name":"Ганна Курочка","desc":"Курчата бройлери, кури несучки. Домашнє вирощування.","price":"від 150 грн/шт","phone":"050 333 44 55","photo":""}];
const newsItems=[{"id":101,"emoji":"📢","title":"Збори мешканців","text":"В суботу о 16:00 біля сільради — збори мешканців. Обговорення ремонту дороги.","date":"17.05.2025","priority":"important"},{"id":102,"emoji":"💧","title":"Перебої з водою","text":"У зв'язку з ремонтними роботами 18 травня з 9:00 до 14:00 можливі перебої з водопостачанням.","date":"17.05.2025","priority":"urgent"},{"id":103,"emoji":"🌱","title":"Розподіл саджанців","text":"У п'ятницю в магазині безкоштовно роздаватимуть саджанці помідорів та перцю.","date":"16.05.2025","priority":"normal"}];
const CATS=[{"id":"all","label":"Всі"},{"id":"food","label":"Продукти"},{"id":"wood","label":"Дрова і дошки"},{"id":"service","label":"Майстри"},{"id":"transport","label":"Транспорт"},{"id":"animals","label":"Тварини"}];
let cat='all';
function cLabel(id){return CATS.find(c=>c.id===id)?.label||id;}
function renderNews(){
  const nb=document.getElementById('news-board');
  if(!newsItems.length){nb.style.display='none';return;}
  nb.innerHTML='<div class="news-board"><div class="news-board-header">📌 Дошка оголошень</div><div class="news-list">'+
    newsItems.map(n=>`<div class="news-item ${n.priority}"><div class="news-emoji">${n.emoji}</div><div class="news-body"><div class="news-title">${n.title}</div><div class="news-text">${n.text}</div><div class="news-date">${n.date}</div></div></div>`).join('')+
  '</div></div>';
}
function renderCats(){document.getElementById('cats').innerHTML=CATS.map(c=>`<button class="cat-btn${c.id===cat?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`).join('');}
function setCat(id){cat=id;render();}
function wf(n,a,b,c){const m=n%10,h=n%100;if(h>=11&&h<=19)return c;if(m===1)return a;if(m>=2&&m<=4)return b;return c;}
function render(){
  renderCats();
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const f=sellers.filter(s=>(cat==='all'||s.cat===cat)&&(!q||s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)));
  document.getElementById('count').textContent=f.length?`Знайдено: ${f.length} ${wf(f.length,'оголошення','оголошення','оголошень')}`:'';
  const g=document.getElementById('grid');
  if(!f.length){g.innerHTML='<div class="empty"><span>🌾</span>Нічого не знайдено.</div>';return;}
  g.innerHTML=f.map(s=>`<div class="card" onclick="openModal(${s.id})"><div class="card-img">${s.photo?`<img src="${s.photo}" alt="">`:s.emoji}</div><div class="card-body"><div class="card-tag">${cLabel(s.cat)}</div><div class="card-name">${s.name}</div><div class="card-desc">${s.desc.length>65?s.desc.slice(0,65)+'…':s.desc}</div><div class="card-price">${s.price}</div><div class="card-phone">📞 ${s.phone}</div></div></div>`).join('');
}
function openModal(id){
  const s=sellers.find(x=>x.id===id);if(!s)return;
  const mi=document.getElementById('m-img');
  mi.innerHTML=s.photo?`<img src="${s.photo}" alt="" style="width:100%;height:100%;object-fit:cover"><button class="modal-close" onclick="closeModal()">✕</button>`:`<span style="font-size:4.5rem">${s.emoji}</span><button class="modal-close" onclick="closeModal()">✕</button>`;
  document.getElementById('m-tag').textContent=cLabel(s.cat);
  document.getElementById('m-name').textContent=s.name;
  document.getElementById('m-desc').textContent=s.desc;
  document.getElementById('m-price').textContent=s.price;
  const btn=document.getElementById('m-phone');btn.textContent='📞 '+s.phone;btn.href='tel:'+s.phone.replace(/\s/g,'');
  document.getElementById('modal').classList.add('open');document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
renderNews();render();
</script></body></html>
